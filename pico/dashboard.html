<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">

        <title>On Air sign control</title>

        <style>
            body {
                font-family: sans-serif;
                text-align: center;
                margin: 2em
            }

            button {
                font-size: 1.4em;
                padding: .6em 1.2em;
                margin: .3em;
                border: none;
                border-radius: 8px;
                cursor: pointer
            }

            #msg {
                margin-top: 10px;
                font-size: 1em;
                opacity: 0;
                transition: opacity .3s
            }

            #stats {
                margin-top: 1.5em;
                font-size: .9em;
                color: #555;
            }
        </style>
    </head>

    <body>
        <h2>On Air sign color</h2>

        <button onclick="send('/off')" style="background:#CCCCCC">OFF</button>
        <button onclick="send('/yellow')" style="background:#CC9900">YELLOW</button>
        <button onclick="send('/red')" style="background:#FF0000;color:#FFFFFF">RED</button>

        <div id="msg"></div>

        <div id="stats">Loading stats…</div>

        <script>
            var base = location.protocol === "file:" ? "http://192.168.0.209" : "";

            function flash(t) {
                var m = document.getElementById("msg");
                m.textContent = t;
                m.style.opacity = 1;
                setTimeout(function () {m.style.opacity = 0}, 2000)
            }

            function send(p) {
                fetch(base + p)
                .then(function (r) {r.ok ? flash("\u2714 Sent") : flash("\u2718 Failed")})
                .catch(function () {flash("\u2718 Failed")})
            }

            function fmtUptime(s) {
                var d = Math.floor(s / 86400), h = Math.floor(s % 86400 / 3600),
                    m = Math.floor(s % 3600 / 60), sec = s % 60;
                if (d > 0) return d + "d " + h + "h " + m + "m";
                if (h > 0) return h + "h " + m + "m " + sec + "s";
                if (m > 0) return m + "m " + sec + "s";
                return sec + "s";
            }

            function getStats() {
                fetch(base + "/stats")
                .then(function (r) {return r.json()})
                .then(function (d) {
                    var total = d.mem_free + d.mem_alloc;
                    var pct = Math.round(d.mem_alloc / total * 100);
                    document.getElementById("stats").textContent =
                        "Memory: " + Math.round(d.mem_alloc / 1024) + " KB used / " +
                        Math.round(total / 1024) + " KB total (" + pct + "%) \u00b7 " +
                        "Uptime: " + fmtUptime(d.uptime_s);
                })
                .catch(function () {
                    document.getElementById("stats").textContent = "Stats unavailable";
                });
            }

            getStats();
        </script>
    </body>
</html>
